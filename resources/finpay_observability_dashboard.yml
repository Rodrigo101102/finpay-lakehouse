      serialized_dashboard: |
        {"datasets": [{"name": "fb935219", "displayName": "q_filas_procesados_por_capa", "queryLines": ["SELECT\r\n", "  CASE\r\n", "    WHEN origin.flow_name LIKE '%.bronze.%' THEN 'Bronze'\r\n", "    WHEN origin.flow_name LIKE '%.silver.%' THEN 'Silver'\r\n", "    WHEN origin.flow_name LIKE '%.gold.%' THEN 'Gold'\r\n", "    ELSE 'Otro'\r\n", "  END AS capa,\r\n", "  SUM(COALESCE(CAST(details:flow_progress:metrics:num_output_rows AS BIGINT), 0)) AS cantidad_registros\r\n", "FROM fintech_finpay.observability.event_logs\r\n", "WHERE event_type = 'flow_progress'\r\n", "GROUP BY 1\r\n", "HAVING capa != 'Otro'\r\n", "ORDER BY 1\r\n"], "catalog": "fintech_finpay", "schema": "observability"}, {"name": "b8780e3a", "displayName": "q_rechazados_por_calidad", "queryLines": ["SELECT\r\n", "  origin.flow_name AS tabla,\r\n", "  SUM(CAST(details:flow_progress:data_quality:dropped_records AS BIGINT)) AS cantidad_rechazados\r\n", "FROM fintech_finpay.observability.event_logs\r\n", "WHERE event_type = 'flow_progress'\r\n", "  AND CAST(details:flow_progress:data_quality:dropped_records AS BIGINT) >= 0\r\n", "GROUP BY 1\r\n", "ORDER BY cantidad_rechazados DESC\r\n"]}, {"name": "e21745fc", "displayName": "q_tendencia_filas_procesadas_capa", "queryLines": ["SELECT\r\n", "  DATE(timestamp) AS fecha,\r\n", "  CASE\r\n", "    WHEN origin.flow_name LIKE '%.bronze.%' THEN 'Bronze'\r\n", "    WHEN origin.flow_name LIKE '%.silver.%' THEN 'Silver'\r\n", "    WHEN origin.flow_name LIKE '%.gold.%' THEN 'Gold'\r\n", "    ELSE 'Otro'\r\n", "  END AS capa,\r\n", "  SUM(COALESCE(CAST(details:flow_progress:metrics:num_output_rows AS BIGINT), 0)) AS filas_procesadas\r\n", "FROM fintech_finpay.observability.event_logs\r\n", "WHERE event_type = 'flow_progress'\r\n", "GROUP BY 1, 2\r\n", "HAVING capa != 'Otro'\r\n", "ORDER BY 1 DESC\r\n"]}, {"name": "dd8a1110", "displayName": "resumen_cuarentena_motivo_rechazo", "queryLines": ["SELECT\r\n", "  rejection_reason AS motivo_rechazo,\r\n", "  source_name AS fuente,\r\n", "  COUNT(*) AS cantidad_registros,\r\n", "  MAX(processed_at) AS ultimo_incidente,\r\n", "  ROW_NUMBER() OVER (ORDER BY COUNT(*) DESC) AS orden\r\n", "FROM fintech_finpay.silver.quarantine\r\n", "GROUP BY 1, 2\r\n", "ORDER BY cantidad_registros DESC;"]}, {"name": "3a93ab19", "displayName": "q_ejecucion_pipeline", "queryLines": ["SELECT\r\n", "  REGEXP_EXTRACT(origin.flow_name, '[^.]+$', 0) AS tabla,\r\n", "  CASE\r\n", "    WHEN origin.flow_name LIKE '%.bronze.%' THEN 'Bronze'\r\n", "    WHEN origin.flow_name LIKE '%.silver.%' THEN 'Silver'\r\n", "    WHEN origin.flow_name LIKE '%.gold.%' THEN 'Gold'\r\n", "    ELSE 'Otro'\r\n", "  END AS capa,\r\n", "  SUM(CAST(details:flow_progress:metrics:num_output_rows AS BIGINT)) AS cantidad_registros\r\n", "FROM fintech_finpay.observability.event_logs\r\n", "WHERE event_type = 'flow_progress'\r\n", "GROUP BY 1, 2\r\n", "HAVING capa != 'Otro'\r\n", "ORDER BY cantidad_registros DESC"]}, {"name": "99a69a8d", "displayName": "tendencia_diaria_ingesta", "queryLines": ["SELECT \r\n", "  DATE(timestamp) AS fecha,\r\n", "  CASE \r\n", "    WHEN origin.flow_name LIKE '%.bronze.%' THEN 'Bronze'\r\n", "    WHEN origin.flow_name LIKE '%.silver.%' THEN 'Silver'\r\n", "    WHEN origin.flow_name LIKE '%.gold.%' THEN 'Gold'\r\n", "    ELSE 'Otro'\r\n", "  END AS capa,\r\n", "  SUM(COALESCE(CAST(details:flow_progress:metrics:num_output_rows AS BIGINT), 0)) AS filas_procesadas\r\n", "FROM fintech_finpay.observability.event_logs\r\n", "WHERE event_type = 'flow_progress'\r\n", "  AND origin.flow_name IS NOT NULL\r\n", "GROUP BY 1, 2\r\n", "HAVING capa != 'Otro'\r\n", "ORDER BY 1 ASC\r\n"]}, {"name": "218e652c", "displayName": "distribucion_errores_por_tabla", "queryLines": ["SELECT \r\n", "  origin.flow_name AS tabla,\r\n", "  SUM(CAST(details:flow_progress:data_quality:dropped_records AS BIGINT)) AS total_rechazados\r\n", "FROM fintech_finpay.observability.event_logs\r\n", "WHERE event_type = 'flow_progress'\r\n", "  AND CAST(details:flow_progress:data_quality:dropped_records AS BIGINT) > 0\r\n", "GROUP BY 1\r\n", "ORDER BY 2 DESC\r\n", "LIMIT 10\r\n"]}, {"name": "4c71e7ea", "displayName": "volumen_total_procesados", "queryLines": ["SELECT \r\n", "  SUM(COALESCE(CAST(details:flow_progress:metrics:num_output_rows AS BIGINT), 0)) AS total_procesados\r\n", "FROM fintech_finpay.observability.event_logs\r\n"]}, {"name": "9ec25b4e", "displayName": "tasa_salud_pipeline_%", "queryLines": ["SELECT \r\n", "  ROUND(\r\n", "    (SUM(CAST(details:flow_progress:metrics:num_output_rows AS BIGINT)) * 100.0) / \r\n", "    NULLIF(SUM(CAST(details:flow_progress:metrics:num_output_rows AS BIGINT)) + \r\n", "    SUM(CAST(details:flow_progress:data_quality:dropped_records AS BIGINT)), 0)\r\n", "  , 2) AS tasa_exito_pct\r\n", "FROM fintech_finpay.observability.event_logs\r\n", "WHERE event_type = 'flow_progress'\r\n"]}], "pages": [{"name": "eb4d2b4f", "displayName": "Untitled page", "layout": [{"widget": {"name": "cantidad-de-registros", "queries": [{"name": "main_query", "query": {"datasetName": "fb935219", "fields": [{"name": "capa", "expression": "`capa`"}, {"name": "cantidad_registros", "expression": "`cantidad_registros`"}], "disaggregated": true}}], "spec": {"version": 3, "frame": {"showTitle": true, "title": "Cantidad de registros exitosos por capa", "headerAlignment": "center"}, "widgetType": "bar", "encodings": {"x": {"fieldName": "capa", "scale": {"type": "categorical", "sort": {"by": "y-reversed"}}}, "y": {"fieldName": "cantidad_registros", "axis": {"hideTitle": true}, "scale": {"type": "quantitative"}}, "label": {"show": true}}}}, "position": {"x": 0, "y": 3, "width": 4, "height": 5}}, {"widget": {"name": "61dc5b7f", "queries": [{"name": "dashboards/01f157e49ea11cebb96c1c9f4648e055/datasets/01f157f237d8164d94f28f8e80710102_fecha", "query": {"datasetName": "e21745fc", "fields": [{"name": "fecha", "expression": "`fecha`"}, {"name": "fecha_associativity", "expression": "COUNT_IF(`associative_filter_predicat